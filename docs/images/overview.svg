<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 840" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#111a2e"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#38bdf8"/><stop offset="1" stop-color="#0ea5e9"/></linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#c084fc"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
    <linearGradient id="emerald" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#4ade80"/><stop offset="1" stop-color="#22c55e"/></linearGradient>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="1240" height="840" rx="24" fill="url(#bg)"/>
  <rect x="1" y="1" width="1238" height="838" rx="23" fill="none" stroke="#243049" stroke-width="1.5"/>

  <!-- header -->
  <text x="48" y="66" fill="#f1f5f9" font-size="42" font-weight="800" letter-spacing="0.5">MemoBase</text>
  <circle cx="270" cy="54" r="5" fill="#38bdf8"/><circle cx="286" cy="54" r="5" fill="#a855f7"/><circle cx="302" cy="54" r="5" fill="#22c55e"/>
  <text x="48" y="98" fill="#93a4bd" font-size="18">Yuque-style hierarchy  ×  Notion-style views  —  built on the Memos core</text>

  <!-- legend -->
  <g transform="translate(940,40)">
    <circle cx="10" cy="16" r="6" fill="#22c55e"/>
    <text x="26" y="21" fill="#cbd5e1" font-size="15">Shipped</text>
    <rect x="120" y="9" width="16" height="14" rx="3" fill="none" stroke="#f59e0b" stroke-width="1.6" stroke-dasharray="4 3"/>
    <text x="146" y="21" fill="#cbd5e1" font-size="15">Planned</text>
  </g>

  <!-- ============ PILLAR 1: Knowledge Base ============ -->
  <g transform="translate(48,150)">
    <rect x="0" y="0" width="366" height="368" rx="16" fill="#141d31" stroke="#233150" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="368" rx="3" fill="url(#cyan)"/>
    <!-- icon: folder -->
    <circle cx="42" cy="46" r="22" fill="#0e2a3d" stroke="#38bdf8" stroke-width="1.5"/>
    <path d="M31 40h9l3 4h13v13H31z" fill="none" stroke="#38bdf8" stroke-width="2" stroke-linejoin="round"/>
    <text x="78" y="40" fill="#e9f6ff" font-size="21" font-weight="700">Knowledge Base</text>
    <text x="78" y="61" fill="#7db8d6" font-size="13" font-weight="600" letter-spacing="0.4">HIERARCHY · YUQUE-LIKE</text>
    <line x1="24" y1="84" x2="342" y2="84" stroke="#233150" stroke-width="1.2"/>
    <g fill="#cdd8ea" font-size="14.5">
      <circle cx="30" cy="111" r="3.5" fill="#38bdf8"/><text x="44" y="116">Workspaces = knowledge bases</text>
      <circle cx="30" cy="143" r="3.5" fill="#38bdf8"/><text x="44" y="148">Multi-level folder tree navigator</text>
      <circle cx="30" cy="175" r="3.5" fill="#38bdf8"/><text x="44" y="180">Preview-first document editor</text>
      <circle cx="30" cy="207" r="3.5" fill="#38bdf8"/><text x="44" y="212">Markdown outline panel</text>
      <circle cx="30" cy="239" r="3.5" fill="#38bdf8"/><text x="44" y="244">Bookshelf launcher</text>
      <circle cx="30" cy="271" r="3.5" fill="#38bdf8"/><text x="44" y="276">Explore filters: base · visibility · archive</text>
      <circle cx="30" cy="303" r="3.5" fill="#38bdf8"/><text x="44" y="308">Resume last-opened document</text>
    </g>
  </g>

  <!-- ============ PILLAR 2: Rich Documents ============ -->
  <g transform="translate(437,150)">
    <rect x="0" y="0" width="366" height="368" rx="16" fill="#141d31" stroke="#233150" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="368" rx="3" fill="url(#violet)"/>
    <!-- icon: document -->
    <circle cx="42" cy="46" r="22" fill="#241436" stroke="#c084fc" stroke-width="1.5"/>
    <path d="M35 34h11l7 7v17H35z" fill="none" stroke="#c084fc" stroke-width="2" stroke-linejoin="round"/>
    <line x1="39" y1="46" x2="49" y2="46" stroke="#c084fc" stroke-width="2"/><line x1="39" y1="52" x2="49" y2="52" stroke="#c084fc" stroke-width="2"/>
    <text x="78" y="40" fill="#f5ecff" font-size="21" font-weight="700">Rich Documents</text>
    <text x="78" y="61" fill="#c3a0e6" font-size="13" font-weight="600" letter-spacing="0.4">HTML · PDF · MEDIA</text>
    <line x1="24" y1="84" x2="342" y2="84" stroke="#233150" stroke-width="1.2"/>
    <g fill="#cdd8ea" font-size="14.5">
      <circle cx="30" cy="111" r="3.5" fill="#c084fc"/><text x="44" y="116">Markdown + HTML + PDF doc types</text>
      <circle cx="30" cy="143" r="3.5" fill="#c084fc"/><text x="44" y="148">Sandboxed HTML rendering</text>
      <circle cx="30" cy="175" r="3.5" fill="#c084fc"/><text x="44" y="180">pdf.js viewer: annotate + extract text</text>
      <circle cx="30" cy="207" r="3.5" fill="#c084fc"/><text x="44" y="212">Inline audio / video / images</text>
      <circle cx="30" cy="239" r="3.5" fill="#c084fc"/><text x="44" y="244">S3 proxy storage (Memos domain)</text>
      <circle cx="30" cy="271" r="3.5" fill="#c084fc"/><text x="44" y="276">Weekly SQLite backup to S3</text>
      <circle cx="30" cy="303" r="3.5" fill="#c084fc"/><text x="44" y="308">10 MB media guardrail</text>
    </g>
  </g>

  <!-- ============ PILLAR 3: Gallery Views ============ -->
  <g transform="translate(826,150)">
    <rect x="0" y="0" width="366" height="368" rx="16" fill="#141d31" stroke="#233150" stroke-width="1.5"/>
    <rect x="0" y="0" width="6" height="368" rx="3" fill="url(#emerald)"/>
    <!-- icon: grid -->
    <circle cx="42" cy="46" r="22" fill="#0f2c1e" stroke="#4ade80" stroke-width="1.5"/>
    <g fill="none" stroke="#4ade80" stroke-width="2">
      <rect x="33" y="37" width="8" height="8" rx="1.5"/><rect x="44" y="37" width="8" height="8" rx="1.5"/>
      <rect x="33" y="48" width="8" height="8" rx="1.5"/><rect x="44" y="48" width="8" height="8" rx="1.5"/>
    </g>
    <text x="78" y="40" fill="#eafff1" font-size="21" font-weight="700">Gallery Views</text>
    <text x="78" y="61" fill="#8fdcae" font-size="13" font-weight="600" letter-spacing="0.4">LIVE VIEWS · NOTION-LIKE</text>
    <line x1="24" y1="84" x2="342" y2="84" stroke="#233150" stroke-width="1.2"/>
    <g fill="#cdd8ea" font-size="14.5">
      <circle cx="30" cy="111" r="3.5" fill="#4ade80"/><text x="44" y="116">"view" document type</text>
      <circle cx="30" cy="143" r="3.5" fill="#4ade80"/><text x="44" y="148">Live gallery of documents</text>
      <circle cx="30" cy="175" r="3.5" fill="#4ade80"/><text x="44" y="180">Scope: folder / tag / property</text>
      <circle cx="30" cy="207" r="3.5" fill="#4ade80"/><text x="44" y="212">Sort · cover · card fields</text>
      <circle cx="30" cy="239" r="3.5" fill="#4ade80"/><text x="44" y="244">Always current, never stale</text>
      <circle cx="30" cy="271" r="3.5" fill="#4ade80"/><text x="44" y="276">Config only — no baked HTML</text>
      <circle cx="30" cy="303" r="3.5" fill="#4ade80"/><text x="44" y="308">Hidden from the Explore feed</text>
    </g>
  </g>

  <!-- ============ ROADMAP (planned) ============ -->
  <g transform="translate(48,542)">
    <rect x="0" y="0" width="1144" height="120" rx="16" fill="#1a1710" stroke="#f59e0b" stroke-width="1.6" stroke-dasharray="7 5"/>
    <text x="28" y="36" fill="#fbbf24" font-size="16" font-weight="700" letter-spacing="0.4">ON THE ROADMAP</text>
    <g>
      <text x="28" y="72" fill="#fde9c2" font-size="16.5" font-weight="700">memogit client</text>
      <text x="28" y="96" fill="#c9b892" font-size="14">clone · pull · push a knowledge base to local files</text>
    </g>
    <line x1="392" y1="52" x2="392" y2="104" stroke="#5c4a24" stroke-width="1.2"/>
    <g>
      <text x="420" y="72" fill="#fde9c2" font-size="16.5" font-weight="700">AI agent collaboration</text>
      <text x="420" y="96" fill="#c9b892" font-size="14">Claude / GPT co-edit your knowledge base</text>
    </g>
    <line x1="784" y1="52" x2="784" y2="104" stroke="#5c4a24" stroke-width="1.2"/>
    <g>
      <text x="812" y="72" fill="#fde9c2" font-size="16.5" font-weight="700">More view types</text>
      <text x="812" y="96" fill="#c9b892" font-size="14">calendar, board, and beyond</text>
    </g>
  </g>

  <!-- ============ FOUNDATION ============ -->
  <g transform="translate(48,686)">
    <rect x="0" y="0" width="1144" height="96" rx="16" fill="#101a2f" stroke="#2b3a5c" stroke-width="1.5"/>
    <circle cx="52" cy="48" r="26" fill="#0f2748" stroke="#3b82f6" stroke-width="2"/>
    <text x="52" y="56" fill="#60a5fa" font-size="26" font-weight="800" text-anchor="middle">M</text>
    <text x="98" y="42" fill="#e2e8f0" font-size="18" font-weight="700">Built on Memos</text>
    <text x="98" y="68" fill="#93a4bd" font-size="14.5">Single Go binary · Markdown-native · REST + gRPC APIs · self-hosted · SQLite / MySQL / Postgres</text>
    <text x="1120" y="55" fill="#4b5b78" font-size="13" text-anchor="end">FOUNDATION</text>
  </g>
</svg>
